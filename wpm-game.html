<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WPM Speed Reader</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      color: #fff;
      font-family: 'Georgia', serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      user-select: none;
    }

    #progress-bar-container {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 4px;
      background: #222;
    }
    #progress-bar {
      height: 100%;
      background: #4af;
      width: 0%;
      transition: width 0.1s linear;
    }

    #speed-label {
      position: fixed;
      top: 16px; right: 20px;
      font-size: 0.9rem;
      color: #888;
      font-family: monospace;
    }

    #score-display {
      position: fixed;
      top: 16px; left: 20px;
      font-size: 0.9rem;
      color: #888;
      font-family: monospace;
    }

    #word-display {
      font-size: 5rem;
      font-weight: bold;
      text-align: center;
      min-height: 7rem;
      display: flex;
      align-items: center;
      justify-content: center;
      letter-spacing: 0.02em;
    }

    .screen {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      width: 100%;
      max-width: 700px;
      padding: 2rem;
    }
    .screen.active { display: flex; }

    #title {
      font-size: 2.5rem;
      font-weight: bold;
      letter-spacing: 0.05em;
    }
    #high-score-display {
      color: #888;
      font-size: 1rem;
      font-family: monospace;
    }

    #settings-toggle {
      background: none;
      border: 1px solid #444;
      color: #aaa;
      padding: 0.4rem 1rem;
      cursor: pointer;
      font-size: 0.85rem;
      border-radius: 4px;
      font-family: monospace;
    }
    #settings-toggle:hover { border-color: #888; color: #fff; }

    #settings-panel {
      display: none;
      flex-direction: column;
      gap: 0.8rem;
      width: 100%;
      background: #111;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 1.2rem;
    }
    #settings-panel.open { display: flex; }

    .setting-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }
    .setting-row label {
      font-size: 0.85rem;
      color: #aaa;
      font-family: monospace;
      white-space: nowrap;
    }
    .setting-row input[type=range] {
      flex: 1;
      accent-color: #4af;
    }
    .setting-row .val {
      font-size: 0.85rem;
      color: #fff;
      font-family: monospace;
      min-width: 3.5rem;
      text-align: right;
    }
    .setting-row select {
      background: #222;
      color: #fff;
      border: 1px solid #444;
      padding: 0.2rem 0.5rem;
      font-size: 0.85rem;
      border-radius: 4px;
    }

    .btn {
      padding: 0.8rem 2.5rem;
      font-size: 1.1rem;
      background: #fff;
      color: #000;
      border: none;
      cursor: pointer;
      font-weight: bold;
      border-radius: 4px;
      letter-spacing: 0.05em;
    }
    .btn:hover { background: #ddd; }
    .btn-secondary {
      background: none;
      color: #aaa;
      border: 1px solid #444;
      padding: 0.6rem 1.5rem;
      font-size: 0.9rem;
    }
    .btn-secondary:hover { color: #fff; border-color: #888; background: none; }

    #countdown-number {
      font-size: 8rem;
      font-weight: bold;
      color: #fff;
      animation: pulse 0.8s ease-out;
    }
    @keyframes pulse {
      from { transform: scale(1.3); opacity: 0.5; }
      to   { transform: scale(1); opacity: 1; }
    }

    #flash-screen {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
    }
    #flash-screen.active { display: flex; }

    #recall-input {
      width: 100%;
      max-width: 600px;
      background: #111;
      border: 2px solid #4af;
      color: #fff;
      font-size: 1.2rem;
      padding: 0.8rem 1rem;
      border-radius: 6px;
      text-align: center;
      outline: none;
      font-family: 'Georgia', serif;
    }
    #recall-input::placeholder { color: #555; }
    #recall-hint {
      font-size: 0.85rem;
      color: #666;
      font-family: monospace;
    }
    #recall-feedback {
      font-size: 1rem;
      font-family: monospace;
      min-height: 1.5rem;
    }
    .correct { color: #4f8; }
    .wrong { color: #f44; }

    #result-wpm {
      font-size: 5rem;
      font-weight: bold;
    }
    #result-label {
      font-size: 1.2rem;
      color: #aaa;
      letter-spacing: 0.1em;
    }
    #result-detail {
      font-size: 0.9rem;
      color: #666;
      font-family: monospace;
      text-align: center;
    }
    #new-high-score {
      color: #ff0;
      font-size: 1rem;
      font-family: monospace;
      letter-spacing: 0.1em;
    }
  </style>
</head>
<body>

  <div id="progress-bar-container"><div id="progress-bar"></div></div>
  <div id="speed-label"></div>
  <div id="score-display"></div>

  <!-- Start Screen -->
  <div id="start-screen" class="screen active">
    <div id="title">SPEED READ</div>
    <div id="high-score-display">BEST: — WPM</div>

    <button id="settings-toggle">⚙ settings</button>
    <div id="settings-panel">
      <div class="setting-row">
        <label>Starting WPM</label>
        <input type="range" id="start-wpm" min="50" max="500" step="50" value="100">
        <span class="val" id="start-wpm-val">100 WPM</span>
      </div>
      <div class="setting-row">
        <label>WPM step</label>
        <input type="range" id="wpm-step" min="25" max="200" step="25" value="100">
        <span class="val" id="wpm-step-val">+100 WPM</span>
      </div>
      <div class="setting-row">
        <label>Words per round</label>
        <input type="range" id="words-per-round" min="1" max="100" step="1" value="8">
        <span class="val" id="words-per-round-val">8 (auto)</span>
      </div>
      <div class="setting-row">
        <label>Mode</label>
        <select id="mode">
          <option value="sentences">Real sentences</option>
          <option value="words">Random words</option>
        </select>
      </div>
    </div>

    <button class="btn" id="start-btn">START</button>
  </div>

  <!-- Countdown Screen -->
  <div id="countdown-screen" class="screen">
    <div id="countdown-number">3</div>
  </div>

  <!-- Flash Screen (fullscreen) -->
  <div id="flash-screen">
    <div id="word-display"></div>
  </div>

  <!-- Recall Screen -->
  <div id="recall-screen" class="screen">
    <div id="recall-hint">Type what you just read</div>
    <input id="recall-input" type="text" placeholder="…" autocomplete="off" autocorrect="off" spellcheck="false">
    <div id="recall-feedback"></div>
  </div>

  <!-- Result Screen -->
  <div id="result-screen" class="screen">
    <div id="result-label">GAME OVER</div>
    <div id="result-wpm">—</div>
    <div style="color:#aaa; font-size:1rem; letter-spacing:0.1em;">WPM</div>
    <div id="new-high-score" style="display:none">★ NEW HIGH SCORE ★</div>
    <div id="result-detail"></div>
    <div style="display:flex; gap:1rem; margin-top:1rem;">
      <button class="btn" id="play-again-btn">PLAY AGAIN</button>
      <button class="btn btn-secondary" id="back-btn">SETTINGS</button>
    </div>
  </div>

  <script>
  const SENTENCES = [
    "The quick brown fox jumps over the lazy dog",
    "She sells seashells by the seashore every single day",
    "A stitch in time saves nine and prevents further damage",
    "The early bird catches the worm before sunrise",
    "All that glitters is not gold in the end",
    "Actions speak louder than words when it truly matters",
    "Every cloud has a silver lining if you look",
    "The pen is mightier than the sword in history",
    "Beauty is in the eye of the beholder always",
    "Time flies when you are having lots of fun",
    "A picture is worth a thousand words they say",
    "Rome was not built in a single day ever",
    "Two wrongs do not make a right at all",
    "Practice makes perfect if you keep trying every day",
    "When in doubt leave it out of the text",
    "Knowledge is power and power changes everything around us",
    "The grass is always greener on the other side",
    "You cannot judge a book by its cover alone",
    "Better late than never when it comes to learning",
    "Birds of a feather flock together in large groups",
    "A rolling stone gathers no moss along the way",
    "The squeaky wheel gets the grease in most cases",
    "Fortune favors the bold and the brave at heart",
    "Curiosity killed the cat but satisfaction brought it back",
    "The devil is in the details of everything here",
    "Necessity is the mother of all invention and progress",
    "Laughter is the best medicine for the human soul",
    "Where there is smoke there is usually fire nearby",
    "Great minds think alike but fools seldom ever differ",
    "The road to success is always under construction ahead",
  ];

  const COMMON_WORDS = [
    "the","be","to","of","and","a","in","that","have","it",
    "for","not","on","with","he","as","you","do","at","this",
    "but","his","by","from","they","we","say","her","she","or",
    "an","will","my","one","all","would","there","their","what","so",
    "up","out","if","about","who","get","which","go","me","when",
    "make","can","like","time","no","just","him","know","take","people",
    "into","year","your","good","some","could","them","see","other","than",
    "then","now","look","only","come","its","over","think","also","back",
    "after","use","two","how","our","work","first","well","way","even",
    "new","want","because","any","these","give","day","most","us","great",
  ];

  let state = {
    phase: 'idle',
    currentWpm: 100,
    startWpm: 100,
    wpmStep: 100,
    wordsPerRound: 0,
    mode: 'sentences',
    currentSentence: '',
    currentWords: [],
    wordIndex: 0,
    flashTimer: null,
    score: 0,
    usedSentences: new Set(),
  };

  const highScore = () => parseInt(localStorage.getItem('wpm-high-score') || '0');
  const saveHighScore = (s) => localStorage.setItem('wpm-high-score', s);

  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById('flash-screen').classList.remove('active');
    const el = document.getElementById(id);
    if (el) el.classList.add('active');
  }

  function initSettings() {
    const sliders = [
      ['start-wpm', 'start-wpm-val', v => v + ' WPM'],
      ['wpm-step', 'wpm-step-val', v => '+' + v + ' WPM'],
      ['words-per-round', 'words-per-round-val', v => v == 1 ? '1 word' : v <= 8 ? v + ' (auto)' : v + ' words'],
    ];
    sliders.forEach(([id, valId, fmt]) => {
      const slider = document.getElementById(id);
      const valEl = document.getElementById(valId);
      valEl.textContent = fmt(slider.value);
      slider.addEventListener('input', () => { valEl.textContent = fmt(slider.value); });
    });

    document.getElementById('settings-toggle').addEventListener('click', () => {
      document.getElementById('settings-panel').classList.toggle('open');
    });
  }

  function readSettings() {
    state.startWpm = parseInt(document.getElementById('start-wpm').value);
    state.wpmStep = parseInt(document.getElementById('wpm-step').value);
    state.wordsPerRound = parseInt(document.getElementById('words-per-round').value);
    state.mode = document.getElementById('mode').value;
  }

  function buildSentence() {
    if (state.mode === 'sentences') {
      if (state.usedSentences.size >= SENTENCES.length) state.usedSentences.clear();
      let idx;
      do { idx = Math.floor(Math.random() * SENTENCES.length); }
      while (state.usedSentences.has(idx));
      state.usedSentences.add(idx);
      let words = SENTENCES[idx].split(' ');
      if (state.wordsPerRound > 0 && state.wordsPerRound < words.length) {
        words = words.slice(0, state.wordsPerRound);
      }
      return words;
    } else {
      const count = state.wordsPerRound > 0 ? state.wordsPerRound : 8;
      const words = [];
      for (let i = 0; i < count; i++) {
        words.push(COMMON_WORDS[Math.floor(Math.random() * COMMON_WORDS.length)]);
      }
      return words;
    }
  }

  function startGame() {
    readSettings();
    state.currentWpm = state.startWpm;
    state.score = 0;
    state.usedSentences.clear();
    updateScoreDisplay();
    runCountdown();
  }

  function runCountdown() {
    showScreen('countdown-screen');
    document.getElementById('speed-label').textContent = state.currentWpm + ' WPM';
    let n = 3;
    const el = document.getElementById('countdown-number');
    el.textContent = n;
    el.style.animation = 'none';
    void el.offsetHeight;
    el.style.animation = 'pulse 0.8s ease-out';

    const tick = setInterval(() => {
      n--;
      if (n <= 0) {
        clearInterval(tick);
        startFlash();
        return;
      }
      el.textContent = n;
      el.style.animation = 'none';
      void el.offsetHeight;
      el.style.animation = 'pulse 0.8s ease-out';
    }, 800);
  }

  function startFlash() {
    state.currentWords = buildSentence();
    state.currentSentence = state.currentWords.join(' ');
    state.wordIndex = 0;

    document.getElementById('progress-bar').style.width = '0%';
    document.getElementById('speed-label').textContent = state.currentWpm + ' WPM';

    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById('flash-screen').classList.add('active');

    flashNextWord();
  }

  function flashNextWord() {
    if (state.wordIndex >= state.currentWords.length) {
      document.getElementById('flash-screen').classList.remove('active');
      startRecall();
      return;
    }

    const word = state.currentWords[state.wordIndex];
    document.getElementById('word-display').textContent = word;

    const pct = ((state.wordIndex + 1) / state.currentWords.length) * 100;
    document.getElementById('progress-bar').style.width = pct + '%';

    const msPerWord = 60000 / state.currentWpm;
    state.wordIndex++;
    state.flashTimer = setTimeout(flashNextWord, msPerWord);
  }

  function startRecall() {
    showScreen('recall-screen');
    const input = document.getElementById('recall-input');
    input.value = '';
    input.disabled = false;
    document.getElementById('recall-feedback').textContent = '';
    document.getElementById('recall-feedback').className = '';
    input.focus();
    document.getElementById('speed-label').textContent = state.currentWpm + ' WPM';
  }

  function checkRecall() {
    const input = document.getElementById('recall-input');
    const typed = input.value.trim().toLowerCase().replace(/[^a-z0-9 ]/g, '');
    if (!typed) return;
    const expected = state.currentSentence.toLowerCase().replace(/[^a-z0-9 ]/g, '');

    if (typed === expected) {
      state.score = state.currentWpm;
      document.getElementById('recall-feedback').textContent = '✓ correct!';
      document.getElementById('recall-feedback').className = 'correct';
      input.disabled = true;
      updateScoreDisplay();
      setTimeout(() => {
        state.currentWpm += state.wpmStep;
        runCountdown();
      }, 600);
    } else {
      document.getElementById('recall-feedback').textContent = '✗  "' + state.currentSentence + '"';
      document.getElementById('recall-feedback').className = 'wrong';
      input.disabled = true;
      setTimeout(showResult, 1500);
    }
  }

  function showResult() {
    document.getElementById('speed-label').textContent = '';
    document.getElementById('progress-bar').style.width = '0%';

    const prev = highScore();
    const isNew = state.score > prev;
    if (isNew) saveHighScore(state.score);

    document.getElementById('result-wpm').textContent = state.score || '—';
    document.getElementById('new-high-score').style.display = isNew && state.score > 0 ? 'block' : 'none';
    document.getElementById('result-detail').textContent =
      state.score > 0
        ? 'You successfully read at ' + state.score + ' WPM'
        : 'No words recalled correctly';

    updateHighScoreDisplay();
    showScreen('result-screen');
  }

  function updateScoreDisplay() {
    const el = document.getElementById('score-display');
    el.textContent = state.score > 0 ? 'SCORE: ' + state.score + ' WPM' : '';
  }

  function updateHighScoreDisplay() {
    const hs = highScore();
    document.getElementById('high-score-display').textContent =
      hs > 0 ? 'BEST: ' + hs + ' WPM' : 'BEST: —';
  }

  document.getElementById('start-btn').addEventListener('click', startGame);
  document.getElementById('play-again-btn').addEventListener('click', startGame);
  document.getElementById('back-btn').addEventListener('click', () => {
    showScreen('start-screen');
    document.getElementById('speed-label').textContent = '';
  });

  document.getElementById('recall-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') checkRecall();
  });

  initSettings();
  updateHighScoreDisplay();
  showScreen('start-screen');
  </script>
</body>
</html>
