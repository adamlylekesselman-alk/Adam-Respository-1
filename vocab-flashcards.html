<!DOCTYPE html>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vocabulario — Mes Herencia Hispana</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-6px); }
      40% { transform: translateX(6px); }
      60% { transform: translateX(-4px); }
      80% { transform: translateX(4px); }
    }
    .animate-shake { animation: shake 0.5s ease-in-out; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useCallback } = React;

    const ALL_VOCAB = {

        ["Elección personal", "personal choice"],
        ["Ajena", "somebody else's; other people's"],
        ["Elemento clave (el)", "key element"],
        ["Al utilizar", "by utilizing"],
        ["En curso", "ongoing; in process"],
        ["Alfabetización (la)", "literacy"],
        ["En pocas palabras", "in short"],
        ["Alinearse", "to align"],
        ["Encuesta (la)", "survey; poll"],
        ["Asemejarse", "to resemble"],
        ["Entretejido", "intertwined"],
        ["Aversión (la)", "loathing; aversion"],
        ["Identificarse", "to identify oneself"],
        ["Blanqueo (el)", "whitewashing"],

        ["Borrado cultural (el)", "cultural erasure"],

      ],
      "Documental: Hecho en Los Ángeles": [

        ["Antichavista (el/la)", "César Chávez's critic/adversary"],

        ["Chavista (el/la)", "Hugo Chávez's supporter"],
        ["Rincón (el)", "corner; nook"],
        ["Consulado (el)", "consulate"],
        ["Subsistir", "to survive"],
      ],
      "Vocabulario General Útil": [
        ["Acoger", "to welcome; to receive"],
        ["Hispano/a", "Hispanic; Hispanic American"],
        ["Acogedor", "welcoming; warm"],
        ["Latino/a", "Latino; Latin American"],
        ["Acostumbrarse a", "to become accustomed"],
        ["Lengua materna (la)", "mother tongue"],
        ["Aculturación (la)", "acculturation"],
        ["Mayoría (la)", "majority"],
        ["Asimilarse", "to assimilate"],
        ["Minoría (la)", "minority"],
        ["Aporte (el)", "contribution"],
        ["Orgullo (el)", "pride"],
        ["Avergonzarse", "to feel ashamed or embarrassed"],
        ["Orgulloso/a", "proud"],
        ["Bilingüe", "bilingual"],
        ["Porcentaje (el)", "percentage"],
        ["Crisol (el)", "the melting pot"],
        ["Porciento (el)", "percent"],
        ["Emigrar", "to emigrate"],
        ["Preservación (la)", "conservation"],
        ["Estadounidense (el/la)", "American from the U.S."],
        ["Primera, segunda generación (la)", "first, second generation"],
        ["Éxito (el)", "success"],
        ["Representación (la)", "representation"],
        ["Formación académica (la)", "formal education"],
        ["Resiliencia (la)", "resilience"],
        ["Impuestos (los)", "taxes"],
        ["Vergüenza (la)", "shame"],
        ["Inclusivo", "inclusive"],
        ["Vergonzoso", "shy; shameful"],
        ["Herencia (la)", "heritage"],
      ],
    };

    const SECTIONS = Object.keys(ALL_VOCAB);

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    // ── Spaced-repetition helpers (simplified SM-2) ──────────────────────────
    // Each card entry: { word, def, interval, easeFactor, reps, due }
    // interval = days until next review (we use it as a relative "rounds" counter in-session)
    function srInit(cards) {
      return cards.map(([word, def]) => ({
        word, def,
        interval: 0,   // rounds until card is due again (0 = due now)
        easeFactor: 2.5,
        reps: 0,
        graduated: false,
      }));
    }

    // rating: 0=Again, 1=Hard, 2=Good, 3=Easy
    // interval is a "steps ahead" counter — card reappears that many cards later in queue
    function srRate(card, rating) {
      let { interval, easeFactor, reps } = card;
      if (rating === 0) {          // Again — back to front
        reps = 0; interval = 0;
      } else if (rating === 1) {   // Hard — always makes slow progress (+1 until interval≥3, then *1.2)
        reps = Math.max(1, reps);
        interval = interval < 3 ? interval + 1 : Math.round(interval * 1.2);
        easeFactor = Math.max(1.3, easeFactor - 0.15);
      } else if (rating === 2) {   // Good — standard progression
        reps += 1;
        interval = reps === 1 ? 2 : reps === 2 ? 4 : Math.round(interval * easeFactor);
      } else {                     // Easy — fast progression
        reps += 1;
        interval = reps === 1 ? 4 : Math.round(interval * easeFactor * 1.3);
        easeFactor = Math.min(3.0, easeFactor + 0.15);
      }
      // Graduate once interval ≥ 4 (requires at least 2 Good, 1 Easy, or 4 Hard ratings)
      const graduated = interval >= 4;
      return { ...card, interval, easeFactor, reps, graduated };
    }

    // ── Profile persistence ────────────────────────────────────────────────────
    function profileKey(password) {
      if (!password || !password.trim()) return null;
      return `vocab_profile_${password.trim()}`;
    }

    function loadProfile(password) {
      const key = profileKey(password);
      if (!key) return null;
      try {
        const raw = localStorage.getItem(key);
        return raw ? JSON.parse(raw) : null;
      } catch {
        return null;
      }
    }

    function saveProfile(password, data) {
      const key = profileKey(password);
      if (!key) return;
      const serialized = JSON.stringify(data); // allow TypeError to surface for bad data
      try {
        localStorage.setItem(key, serialized);
      } catch {
        // storage full or private browsing — fail silently
      }
    }

    function PasswordScreen({ onLogin }) {
      const [pw, setPw] = useState("");
      const [shake, setShake] = useState(false);
      const shakeTimer = React.useRef(null);

      React.useEffect(() => {
        return () => { if (shakeTimer.current) clearTimeout(shakeTimer.current); };
      }, []);

      const handleSubmit = () => {
        const trimmed = pw.trim();
        if (!trimmed) {
          setShake(true);
          shakeTimer.current = setTimeout(() => setShake(false), 500);
          return;
        }
        const existing = loadProfile(trimmed);
        onLogin(trimmed, existing);
      };

      return (
        <div className="min-h-screen bg-gradient-to-br from-orange-50 via-white to-rose-50 flex items-center justify-center p-4">
          <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-8 w-full max-w-sm text-center">
            <h1 className="text-2xl font-bold text-gray-900 mb-1">Vocabulario</h1>
            <p className="text-sm text-gray-400 mb-6">Enter your password to load your progress</p>
            <input
              type="password"
              value={pw}
              onChange={e => setPw(e.target.value)}
              onKeyDown={e => e.key === "Enter" && handleSubmit()}
              placeholder="Password"
              autoFocus
              className={`w-full px-4 py-3 rounded-xl border-2 focus:outline-none text-gray-800 mb-4 transition-all ${shake ? "border-red-400 animate-shake" : "border-gray-200 focus:border-orange-400"}`}
            />
            <button
              onClick={handleSubmit}
              className="w-full py-3 rounded-xl bg-orange-500 hover:bg-orange-600 text-white font-semibold shadow-md transition-all"
            >
              Continue →
            </button>
            <p className="text-xs text-gray-400 mt-4">New password? A fresh profile will be created.</p>
          </div>
        </div>
      );
    }

    function VocabApp({ profile, setProfile }) {
      const [mode, setMode] = useState("menu");
      const [selectedSections, setSelectedSections] = useState(new Set(SECTIONS));
      const [direction, setDirection] = useState("es-en");
      const [cards, setCards] = useState([]);
      const [currentIndex, setCurrentIndex] = useState(0);
      const [flipped, setFlipped] = useState(false);
      const [known, setKnown] = useState([]);
      const [unknown, setUnknown] = useState([]);
      const [quizCards, setQuizCards] = useState([]);
      const [quizIndex, setQuizIndex] = useState(0);
      const [quizInput, setQuizInput] = useState("");
      const [quizFeedback, setQuizFeedback] = useState(null);
      const [quizScore, setQuizScore] = useState(0);
      const [quizResults, setQuizResults] = useState([]);
      const [matchCards, setMatchCards] = useState([]);
      const [matchSelected, setMatchSelected] = useState([]);
      const [matchMatched, setMatchMatched] = useState(new Set());
      const [matchMisses, setMatchMisses] = useState(0);
      const [matchDone, setMatchDone] = useState(false);
      // learn mode
      const [learnDeck, setLearnDeck] = useState([]);   // full SR card objects
      const [learnQueue, setLearnQueue] = useState([]); // indices of due cards (learnQueue[0] = current)
      const [learnFlipped, setLearnFlipped] = useState(false);
      const [learnRound, setLearnRound] = useState(0);

      const getActiveCards = useCallback(() => {
        let all = [];
        for (const sec of selectedSections) {
          all = all.concat(ALL_VOCAB[sec]);
        }
        return shuffle(all);
      }, [selectedSections]);

      const totalWords = Array.from(selectedSections).reduce(
        (sum, s) => sum + (ALL_VOCAB[s]?.length || 0), 0
      );

      const toggleSection = (sec) => {
        setSelectedSections((prev) => {
          const next = new Set(prev);
          if (next.has(sec)) next.delete(sec);
          else next.add(sec);
          return next;
        });
      };

      const startFlashcards = () => {
        const c = getActiveCards();
        setCards(c);
        setCurrentIndex(0);
        setFlipped(false);
        setKnown([]);
        setUnknown([]);
        setMode("flashcards");
      };

      const startQuiz = () => {
        const c = getActiveCards().slice(0, 20);
        setQuizCards(c);
        setQuizIndex(0);
        setQuizInput("");
        setQuizFeedback(null);
        setQuizScore(0);
        setQuizResults([]);
        setMode("quiz");
      };

      const startLearn = () => {
        const raw = getActiveCards();
        const deck = srInit(raw);
        const queue = deck.map((_, i) => i); // all cards due at start
        setLearnDeck(deck);
        setLearnQueue(shuffle(queue));
        setLearnFlipped(false);
        setLearnRound(0);
        setMode("learn");
      };

      const handleLearnRate = (rating) => {
        const cardIdx = learnQueue[0];
        const updatedCard = srRate(learnDeck[cardIdx], rating);
        const updatedDeck = [...learnDeck];
        updatedDeck[cardIdx] = updatedCard;

        // Queue after removing current card
        const rest = learnQueue.slice(1);

        // Re-insert at `interval` steps ahead if not graduated
        const nextQueue = [...rest];
        if (!updatedCard.graduated) {
          const steps = Math.min(updatedCard.interval, nextQueue.length);
          nextQueue.splice(steps, 0, cardIdx);
        }

        setLearnDeck(updatedDeck);
        setLearnQueue(nextQueue);
        setLearnFlipped(false);
        setLearnRound(r => r + 1);
      };

      const startMatch = () => {
        const pool = getActiveCards().slice(0, 6);
        const items = [];
        pool.forEach(([es, en], i) => {
          items.push({ id: `es-${i}`, text: es, pairId: i, type: "es" });
          items.push({ id: `en-${i}`, text: en, pairId: i, type: "en" });
        });
        setMatchCards(shuffle(items));
        setMatchSelected([]);
        setMatchMatched(new Set());
        setMatchMisses(0);
        setMatchDone(false);
        setMode("match");
      };

      const handleFlashcardResponse = (isKnown) => {
        const card = cards[currentIndex];
        if (isKnown) setKnown((p) => [...p, card]);
        else setUnknown((p) => [...p, card]);
        setFlipped(false);
        if (currentIndex + 1 >= cards.length) setMode("results");
        else setCurrentIndex((i) => i + 1);
      };

      const checkQuiz = () => {
        const [es, en] = quizCards[quizIndex];
        const answer = direction === "es-en" ? en : es;
        const input = quizInput.trim().toLowerCase();
        const correct = answer.toLowerCase();
        const isCorrect =
          input === correct ||
          correct.includes(input) ||
          input.includes(correct.split(";")[0].trim().toLowerCase());
        setQuizFeedback({ isCorrect, correctAnswer: answer });
        if (isCorrect) setQuizScore((s) => s + 1);
        setQuizResults((r) => [
          ...r,
          { word: direction === "es-en" ? es : en, answer, userAnswer: quizInput.trim(), isCorrect },
        ]);
      };

      const nextQuiz = () => {
        setQuizFeedback(null);
        setQuizInput("");
        if (quizIndex + 1 >= quizCards.length) setMode("quizResults");
        else setQuizIndex((i) => i + 1);
      };

      const handleMatchClick = (card) => {
        if (matchMatched.has(card.id)) return;
        if (matchSelected.length === 1 && matchSelected[0].id === card.id) return;

        const next = [...matchSelected, card];
        if (next.length === 2) {
          if (next[0].pairId === next[1].pairId && next[0].type !== next[1].type) {
            const newMatched = new Set(matchMatched);
            newMatched.add(next[0].id);
            newMatched.add(next[1].id);
            setMatchMatched(newMatched);
            if (newMatched.size === matchCards.length) setMatchDone(true);
          } else {
            setMatchMisses((m) => m + 1);
          }
          setTimeout(() => setMatchSelected([]), 400);
        }
        setMatchSelected(next);
      };

      const sectionColor = {
        "Lectura: Latinx": { bg: "bg-violet-50", border: "border-violet-300", tag: "bg-violet-100 text-violet-700" },
        "Documental: Hecho en Los Ángeles": { bg: "bg-amber-50", border: "border-amber-300", tag: "bg-amber-100 text-amber-700" },
        "Cortometraje: El Rincón de Venezuela": { bg: "bg-emerald-50", border: "border-emerald-300", tag: "bg-emerald-100 text-emerald-700" },
        "Vocabulario General Útil": { bg: "bg-sky-50", border: "border-sky-300", tag: "bg-sky-100 text-sky-700" },
      };

      if (mode === "menu") {
        return (
          <div className="min-h-screen bg-gradient-to-br from-orange-50 via-white to-rose-50 p-4 sm:p-8">
            <div className="max-w-2xl mx-auto">
              <div className="text-center mb-8">
                <h1 className="text-3xl font-bold text-gray-900 mb-1">Vocabulario</h1>
                <p className="text-lg text-gray-500">Mes Herencia Hispana — Parte II</p>
                <p className="text-sm text-gray-400 mt-1">{totalWords} words selected</p>
              </div>

              <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-5 mb-6">
                <h2 className="text-sm font-semibold text-gray-500 uppercase tracking-wide mb-3">Sections</h2>
                <div className="space-y-2">
                  {SECTIONS.map((sec) => {
                    const colors = sectionColor[sec];
                    const active = selectedSections.has(sec);
                    return (
                      <button
                        key={sec}
                        onClick={() => toggleSection(sec)}
                        className={`w-full text-left px-4 py-3 rounded-xl border-2 transition-all flex items-center justify-between ${
                          active ? `${colors.bg} ${colors.border}` : "bg-gray-50 border-gray-200 opacity-50"
                        }`}
                      >
                        <span className="font-medium text-gray-800 text-sm">{sec}</span>
                        <span className={`text-xs px-2 py-0.5 rounded-full font-medium ${active ? colors.tag : "bg-gray-200 text-gray-500"}`}>
                          {ALL_VOCAB[sec].length}
                        </span>
                      </button>
                    );
                  })}
                </div>
              </div>

              <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-5 mb-6">
                <h2 className="text-sm font-semibold text-gray-500 uppercase tracking-wide mb-3">Direction</h2>
                <div className="flex gap-2">
                  {[["es-en", "Spanish → English"], ["en-es", "English → Spanish"]].map(([val, label]) => (
                    <button
                      key={val}
                      onClick={() => setDirection(val)}
                      className={`flex-1 py-2.5 rounded-xl text-sm font-medium transition-all ${
                        direction === val ? "bg-orange-500 text-white shadow-md" : "bg-gray-100 text-gray-600 hover:bg-gray-200"
                      }`}
                    >
                      {label}
                    </button>
                  ))}
                </div>
              </div>

              <div className="space-y-3">
                <button
                  onClick={startLearn}
                  disabled={totalWords === 0}
                  className="w-full py-4 rounded-2xl bg-teal-500 hover:bg-teal-600 text-white font-semibold text-lg shadow-lg shadow-teal-200 transition-all disabled:opacity-40"
                >
                  ✦ Learn  <span className="text-sm font-normal opacity-80 ml-1">spaced repetition</span>
                </button>
                <button
                  onClick={startFlashcards}
                  disabled={totalWords === 0}
                  className="w-full py-4 rounded-2xl bg-orange-500 hover:bg-orange-600 text-white font-semibold text-lg shadow-lg shadow-orange-200 transition-all disabled:opacity-40"
                >
                  Flashcards
                </button>
                <div className="flex gap-3">
                  <button
                    onClick={startQuiz}
                    disabled={totalWords === 0}
                    className="flex-1 py-3 rounded-xl bg-rose-500 hover:bg-rose-600 text-white font-medium shadow-md shadow-rose-200 transition-all disabled:opacity-40"
                  >
                    Written Quiz (20)
                  </button>
                  <button
                    onClick={startMatch}
                    disabled={totalWords < 6}
                    className="flex-1 py-3 rounded-xl bg-violet-500 hover:bg-violet-600 text-white font-medium shadow-md shadow-violet-200 transition-all disabled:opacity-40"
                  >
                    Match Game
                  </button>
                </div>
              </div>
            </div>
          </div>
        );
      }

      if (mode === "flashcards") {
        const card = cards[currentIndex];
        const front = direction === "es-en" ? card[0] : card[1];
        const back = direction === "es-en" ? card[1] : card[0];
        const progress = (currentIndex / cards.length) * 100;

        return (
          <div className="min-h-screen bg-gradient-to-br from-orange-50 via-white to-rose-50 p-4 sm:p-8 flex flex-col items-center">
            <div className="w-full max-w-lg">
              <div className="flex items-center justify-between mb-6">
                <button onClick={() => setMode("menu")} className="text-gray-400 hover:text-gray-600 text-sm font-medium">← Back</button>
                <span className="text-sm text-gray-500 font-medium">{currentIndex + 1} / {cards.length}</span>
              </div>
              <div className="w-full bg-gray-200 rounded-full h-1.5 mb-8">
                <div className="bg-orange-400 h-1.5 rounded-full transition-all duration-300" style={{ width: `${progress}%` }} />
              </div>
              <div
                onClick={() => setFlipped(!flipped)}
                className="w-full min-h-64 bg-white rounded-3xl shadow-lg border border-gray-100 flex flex-col items-center justify-center p-8 cursor-pointer select-none hover:shadow-xl transition-shadow"
              >
                {!flipped ? (
                  <>
                    <p className="text-2xl font-bold text-gray-900 text-center">{front}</p>
                    <p className="text-sm text-gray-400 mt-4">tap to reveal</p>
                  </>
                ) : (
                  <>
                    <p className="text-lg text-gray-400 mb-2 text-center">{front}</p>
                    <p className="text-2xl font-bold text-orange-600 text-center">{back}</p>
                  </>
                )}
              </div>
              {flipped && (
                <div className="flex gap-3 mt-6">
                  <button onClick={() => handleFlashcardResponse(false)} className="flex-1 py-3.5 rounded-xl bg-red-100 hover:bg-red-200 text-red-700 font-semibold transition-all">
                    Still learning
                  </button>
                  <button onClick={() => handleFlashcardResponse(true)} className="flex-1 py-3.5 rounded-xl bg-green-100 hover:bg-green-200 text-green-700 font-semibold transition-all">
                    Got it!
                  </button>
                </div>
              )}
              <div className="flex justify-center gap-6 mt-6 text-sm">
                <span className="text-green-600 font-medium">{known.length} known</span>
                <span className="text-red-500 font-medium">{unknown.length} learning</span>
              </div>
            </div>
          </div>
        );
      }

      if (mode === "results") {
        const retryUnknown = () => {
          setCards(shuffle(unknown));
          setCurrentIndex(0);
          setFlipped(false);
          setKnown([]);
          setUnknown([]);
          setMode("flashcards");
        };
        return (
          <div className="min-h-screen bg-gradient-to-br from-orange-50 via-white to-rose-50 p-4 sm:p-8 flex flex-col items-center">
            <div className="max-w-lg w-full text-center">
              <h2 className="text-3xl font-bold text-gray-900 mb-2">Session Complete!</h2>
              <div className="flex justify-center gap-8 my-8">
                <div className="bg-green-50 rounded-2xl p-6 w-32">
                  <p className="text-3xl font-bold text-green-600">{known.length}</p>
                  <p className="text-sm text-green-700 mt-1">Known</p>
                </div>
                <div className="bg-red-50 rounded-2xl p-6 w-32">
                  <p className="text-3xl font-bold text-red-500">{unknown.length}</p>
                  <p className="text-sm text-red-600 mt-1">Review</p>
                </div>
              </div>
              {unknown.length > 0 && (
                <>
                  <button onClick={retryUnknown} className="w-full py-3.5 rounded-xl bg-orange-500 hover:bg-orange-600 text-white font-semibold shadow-md mb-3">
                    Retry missed words ({unknown.length})
                  </button>
                  <div className="bg-white rounded-xl border border-gray-100 p-4 mt-4 text-left max-h-64 overflow-y-auto">
                    {unknown.map(([es, en], i) => (
                      <div key={i} className="flex justify-between py-2 border-b border-gray-50 last:border-0 text-sm">
                        <span className="font-medium text-gray-800">{es}</span>
                        <span className="text-gray-500">{en}</span>
                      </div>
                    ))}
                  </div>
                </>
              )}
              <button onClick={() => setMode("menu")} className="mt-4 text-gray-400 hover:text-gray-600 text-sm font-medium">← Back to menu</button>
            </div>
          </div>
        );
      }

      if (mode === "quiz") {
        const card = quizCards[quizIndex];
        const prompt = direction === "es-en" ? card[0] : card[1];
        return (
          <div className="min-h-screen bg-gradient-to-br from-rose-50 via-white to-orange-50 p-4 sm:p-8 flex flex-col items-center">
            <div className="w-full max-w-lg">
              <div className="flex items-center justify-between mb-6">
                <button onClick={() => setMode("menu")} className="text-gray-400 hover:text-gray-600 text-sm font-medium">← Back</button>
                <span className="text-sm text-gray-500 font-medium">{quizIndex + 1} / {quizCards.length}</span>
              </div>
              <div className="w-full bg-gray-200 rounded-full h-1.5 mb-8">
                <div className="bg-rose-400 h-1.5 rounded-full transition-all" style={{ width: `${(quizIndex / quizCards.length) * 100}%` }} />
              </div>
              <div className="bg-white rounded-3xl shadow-lg border border-gray-100 p-8 text-center mb-6">
                <p className="text-xs text-gray-400 uppercase tracking-wide mb-2">
                  {direction === "es-en" ? "Translate to English" : "Translate to Spanish"}
                </p>
                <p className="text-2xl font-bold text-gray-900">{prompt}</p>
              </div>
              {!quizFeedback ? (
                <div className="flex gap-2">
                  <input
                    type="text"
                    value={quizInput}
                    onChange={(e) => setQuizInput(e.target.value)}
                    onKeyDown={(e) => e.key === "Enter" && quizInput.trim() && checkQuiz()}
                    placeholder="Type your answer..."
                    className="flex-1 px-4 py-3 rounded-xl border-2 border-gray-200 focus:border-rose-400 focus:outline-none text-gray-800"
                    autoFocus
                  />
                  <button onClick={checkQuiz} disabled={!quizInput.trim()} className="px-6 py-3 rounded-xl bg-rose-500 hover:bg-rose-600 text-white font-semibold disabled:opacity-40">
                    Check
                  </button>
                </div>
              ) : (
                <div className="text-center">
                  <div className={`rounded-2xl p-5 mb-4 ${quizFeedback.isCorrect ? "bg-green-50" : "bg-red-50"}`}>
                    <p className={`text-lg font-bold ${quizFeedback.isCorrect ? "text-green-600" : "text-red-500"}`}>
                      {quizFeedback.isCorrect ? "Correct!" : "Not quite"}
                    </p>
                    {!quizFeedback.isCorrect && (
                      <p className="text-gray-600 mt-1">Answer: <span className="font-semibold">{quizFeedback.correctAnswer}</span></p>
                    )}
                  </div>
                  <button onClick={nextQuiz} className="px-8 py-3 rounded-xl bg-rose-500 hover:bg-rose-600 text-white font-semibold">
                    {quizIndex + 1 >= quizCards.length ? "See Results" : "Next →"}
                  </button>
                </div>
              )}
              <p className="text-center text-sm text-green-600 font-medium mt-4">{quizScore} correct so far</p>
            </div>
          </div>
        );
      }

      if (mode === "quizResults") {
        const pct = Math.round((quizScore / quizCards.length) * 100);
        return (
          <div className="min-h-screen bg-gradient-to-br from-rose-50 via-white to-orange-50 p-4 sm:p-8 flex flex-col items-center">
            <div className="max-w-lg w-full text-center">
              <h2 className="text-3xl font-bold text-gray-900 mb-1">Quiz Complete!</h2>
              <p className="text-5xl font-bold text-rose-500 my-6">{pct}%</p>
              <p className="text-gray-500 mb-6">{quizScore} / {quizCards.length} correct</p>
              <div className="bg-white rounded-xl border border-gray-100 p-4 text-left max-h-72 overflow-y-auto mb-6">
                {quizResults.map((r, i) => (
                  <div key={i} className={`flex items-start gap-2 py-2 border-b border-gray-50 last:border-0 text-sm ${r.isCorrect ? "" : "bg-red-50 -mx-2 px-2 rounded"}`}>
                    <span className={`mt-0.5 ${r.isCorrect ? "text-green-500" : "text-red-400"}`}>{r.isCorrect ? "✓" : "✗"}</span>
                    <div className="flex-1">
                      <span className="font-medium text-gray-800">{r.word}</span>
                      {!r.isCorrect && (
                        <div className="text-xs text-gray-500 mt-0.5">You: "{r.userAnswer}" → Correct: "{r.answer}"</div>
                      )}
                    </div>
                  </div>
                ))}
              </div>
              <button onClick={() => setMode("menu")} className="text-gray-400 hover:text-gray-600 text-sm font-medium">← Back to menu</button>
            </div>
          </div>
        );
      }

      if (mode === "match") {
        return (
          <div className="min-h-screen bg-gradient-to-br from-violet-50 via-white to-indigo-50 p-4 sm:p-8 flex flex-col items-center">
            <div className="w-full max-w-xl">
              <div className="flex items-center justify-between mb-6">
                <button onClick={() => setMode("menu")} className="text-gray-400 hover:text-gray-600 text-sm font-medium">← Back</button>
                <span className="text-sm text-gray-500 font-medium">Misses: {matchMisses}</span>
              </div>
              {matchDone ? (
                <div className="text-center py-12">
                  <h2 className="text-3xl font-bold text-gray-900 mb-2">All Matched!</h2>
                  <p className="text-gray-500 mb-6">{matchMisses} misses</p>
                  <div className="flex gap-3 justify-center">
                    <button onClick={startMatch} className="px-6 py-3 rounded-xl bg-violet-500 text-white font-semibold">Play Again</button>
                    <button onClick={() => setMode("menu")} className="px-6 py-3 rounded-xl bg-gray-200 text-gray-700 font-semibold">Menu</button>
                  </div>
                </div>
              ) : (
                <div className="grid grid-cols-3 gap-2.5">
                  {matchCards.map((card) => {
                    const isMatched = matchMatched.has(card.id);
                    const isSelected = matchSelected.some((s) => s.id === card.id);
                    return (
                      <button
                        key={card.id}
                        onClick={() => !isMatched && handleMatchClick(card)}
                        disabled={isMatched}
                        className={`p-3 rounded-xl text-sm font-medium text-center min-h-20 transition-all ${
                          isMatched
                            ? "bg-green-100 text-green-400 border-2 border-green-200"
                            : isSelected
                            ? "bg-violet-500 text-white border-2 border-violet-600 shadow-md"
                            : "bg-white text-gray-800 border-2 border-gray-200 hover:border-violet-300 hover:shadow"
                        }`}
                      >
                        {card.text}
                      </button>
                    );
                  })}
                </div>
              )}
            </div>
          </div>
        );
      }

      // LEARN MODE
      if (mode === "learn") {
        const totalCards = learnDeck.length;
        const graduated = learnDeck.filter(c => c.graduated).length;
        const notGraduated = totalCards - graduated;

        // Session complete
        if (learnQueue.length === 0) {
          return (
            <div className="min-h-screen bg-gradient-to-br from-teal-50 via-white to-emerald-50 p-4 sm:p-8 flex flex-col items-center">
              <div className="max-w-lg w-full text-center pt-16">
                <div className="text-6xl mb-4">🎓</div>
                <h2 className="text-3xl font-bold text-gray-900 mb-2">Session Complete!</h2>
                <p className="text-gray-500 mb-2">You reviewed <span className="font-semibold text-teal-600">{totalCards}</span> words</p>
                <p className="text-gray-500 mb-8">{learnRound} total reviews across {graduated} graduated cards</p>
                <div className="flex gap-3 justify-center">
                  <button onClick={startLearn} className="px-6 py-3 rounded-xl bg-teal-500 hover:bg-teal-600 text-white font-semibold shadow-md">
                    Study Again
                  </button>
                  <button onClick={() => setMode("menu")} className="px-6 py-3 rounded-xl bg-gray-200 hover:bg-gray-300 text-gray-700 font-semibold">
                    Menu
                  </button>
                </div>
              </div>
            </div>
          );
        }

        const cardIdx = learnQueue[0];
        const card = learnDeck[cardIdx];
        const front = direction === "es-en" ? card.word : card.def;
        const back  = direction === "es-en" ? card.def  : card.word;
        const progressPct = Math.round((graduated / totalCards) * 100);

        // Color the card border by how well-known it is
        const repColor =
          card.reps === 0 ? "border-gray-200" :
          card.reps === 1 ? "border-yellow-300" :
          card.reps === 2 ? "border-blue-300" :
                             "border-teal-400";

        return (
          <div className="min-h-screen bg-gradient-to-br from-teal-50 via-white to-emerald-50 p-4 sm:p-8 flex flex-col items-center">
            <div className="w-full max-w-lg">
              {/* Header */}
              <div className="flex items-center justify-between mb-4">
                <button onClick={() => setMode("menu")} className="text-gray-400 hover:text-gray-600 text-sm font-medium">← Back</button>
                <span className="text-sm text-gray-500 font-medium">{notGraduated} words left · {graduated}/{totalCards} mastered</span>
              </div>

              {/* Progress bar */}
              <div className="w-full bg-gray-200 rounded-full h-2 mb-6">
                <div className="bg-teal-500 h-2 rounded-full transition-all duration-500" style={{ width: `${progressPct}%` }} />
              </div>

              {/* Card */}
              <div
                onClick={() => !learnFlipped && setLearnFlipped(true)}
                className={`w-full min-h-56 bg-white rounded-3xl shadow-lg border-2 ${repColor} flex flex-col items-center justify-center p-8 transition-all duration-200 ${!learnFlipped ? "cursor-pointer hover:shadow-xl" : ""}`}
              >
                {!learnFlipped ? (
                  <>
                    <p className="text-xs text-gray-400 uppercase tracking-widest mb-3">
                      {direction === "es-en" ? "Spanish" : "English"}
                    </p>
                    <p className="text-2xl font-bold text-gray-900 text-center">{front}</p>
                    <p className="text-sm text-teal-400 mt-5 font-medium">tap to reveal →</p>
                  </>
                ) : (
                  <>
                    <p className="text-base text-gray-400 mb-1 text-center">{front}</p>
                    <div className="w-10 h-0.5 bg-gray-200 my-2 rounded-full" />
                    <p className="text-2xl font-bold text-teal-700 text-center">{back}</p>
                    {card.reps > 0 && (
                      <p className="text-xs text-gray-400 mt-4">seen {card.reps}× this session</p>
                    )}
                  </>
                )}
              </div>

              {/* Rating buttons — only show after flip */}
              {learnFlipped && (
                <div className="mt-5 space-y-2">
                  <p className="text-center text-xs text-gray-400 uppercase tracking-wide mb-2">How well did you know it?</p>
                  <div className="grid grid-cols-4 gap-2">
                    {[
                      { label: "Again", sub: "forgot", rating: 0, cls: "bg-red-100 hover:bg-red-200 text-red-700 border-red-200" },
                      { label: "Hard",  sub: "struggled", rating: 1, cls: "bg-orange-100 hover:bg-orange-200 text-orange-700 border-orange-200" },
                      { label: "Good",  sub: "got it", rating: 2, cls: "bg-blue-100 hover:bg-blue-200 text-blue-700 border-blue-200" },
                      { label: "Easy",  sub: "instant", rating: 3, cls: "bg-teal-100 hover:bg-teal-200 text-teal-700 border-teal-200" },
                    ].map(({ label, sub, rating, cls }) => (
                      <button
                        key={label}
                        onClick={() => handleLearnRate(rating)}
                        className={`py-3 rounded-xl border font-semibold text-sm flex flex-col items-center transition-all ${cls}`}
                      >
                        <span>{label}</span>
                        <span className="text-xs font-normal opacity-70 mt-0.5">{sub}</span>
                      </button>
                    ))}
                  </div>
                </div>
              )}

              {/* Legend */}
              <div className="mt-6 flex justify-center gap-4 text-xs text-gray-400">
                <span>🔴 Again = review now</span>
                <span>🟡 Hard = review soon</span>
                <span>🟢 Easy = graduate</span>
              </div>
            </div>
          </div>
        );
      }

      return null;
    }

    function App() {
      const [profile, setProfile] = useState(null); // { password, data }

      const handleLogin = (password, existingData) => {
        const defaults = {
          direction: "es-en",
          selectedSections: Object.keys(ALL_VOCAB),
          srData: {},
          quizHistory: [],
          matchBest: null,
        };
        const data = existingData ? { ...defaults, ...existingData } : defaults;
        setProfile({ password, data });
      };

      if (!profile) return <PasswordScreen onLogin={handleLogin} />;
      return <VocabApp profile={profile} setProfile={setProfile} />;
    }

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
  </script>
</body>
</html>
